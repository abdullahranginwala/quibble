name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  gate:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: gofmt
        # `(! grep .)` breaks on macOS bash 3.2 (negation bug) — keep this portable.
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then printf '%s\n' "$out" "gofmt: files need formatting"; exit 1; fi
      - name: vet
        run: go vet ./...
      - name: build
        run: go build ./...
      - name: test
        run: go test ./... -race
